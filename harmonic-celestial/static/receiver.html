<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messaging Service - Receiver</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <h1>📥 Receive Messages</h1>
        <div class="card">
            <div class="form-group">
                <label for="receiverID">Your ID (Receiver):</label>
                <input type="text" id="receiverID" placeholder="Enter your name">
            </div>
            <div class="form-group checkbox-group">
                <input type="checkbox" id="purge">
                <label for="purge">Purge messages after reading (delete from server)</label>
            </div>
            <button id="receiveBtn" onclick="receiveMessages()">Receive Now</button>

            <div id="messagesList" class="messages-container">
                <p class="placeholder">New messages will appear here...</p>
            </div>
        </div>
        <nav>
            <a href="sender.html">← Go to Sender Page</a>
        </nav>
    </div>

    <script>
        async function receiveMessages() {
            const receiverID = document.getElementById('receiverID').value;
            const purge = document.getElementById('purge').checked;
            const listDiv = document.getElementById('messagesList');

            if (!receiverID) {
                listDiv.innerHTML = '<p class="error">Please enter your Receiver ID.</p>';
                return;
            }

            try {
                const response = await fetch(`http://localhost:5000/receiveMsg?receiverID=${receiverID}&purge=${purge}`);

                if (response.ok) {
                    const messages = await response.json();
                    if (messages.length === 0) {
                        listDiv.innerHTML = '<p class="info">No new messages.</p>';
                    } else {
                        listDiv.innerHTML = messages.map(m => `
                            <div class="message-item">
                                <div class="message-header">
                                    <strong>From: ${m.senderID}</strong>
                                    <span>${new Date(m.timestamp).toLocaleTimeString()}</span>
                                </div>
                                <div class="message-content">${m.msg}</div>
                            </div>
                        `).join('');
                    }
                } else {
                    listDiv.innerHTML = '<p class="error">Failed to fetch messages.</p>';
                }
            } catch (error) {
                listDiv.innerHTML = '<p class="error">Service not reachable. Make sure app.py is running.</p>';
            }
        }
    </script>
</body>

</html>
